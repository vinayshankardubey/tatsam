version: '3.8'

services:
  tatsam:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tatsam
    ports:
      - "8042:8042"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=8042
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8042/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
