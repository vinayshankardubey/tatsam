<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 54" width="180" height="54" role="img" aria-label="Get it on Google Play">
  <rect width="180" height="54" rx="9" ry="9" fill="#000000"/>
  <rect x="0.5" y="0.5" width="179" height="53" rx="8.5" ry="8.5" fill="none" stroke="#A6A6A6" stroke-width="1"/>

  <!-- Play triangle — 4-colour segments meeting at the tip -->
  <g transform="translate(14, 14)">
    <defs>
      <linearGradient id="gpBlue" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#00A0FF"/>
        <stop offset="1" stop-color="#00E2FF"/>
      </linearGradient>
      <linearGradient id="gpRed" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#FF3A44"/>
        <stop offset="1" stop-color="#C31162"/>
      </linearGradient>
      <linearGradient id="gpYellow" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#FFE000"/>
        <stop offset="1" stop-color="#FFBD00"/>
      </linearGradient>
      <linearGradient id="gpGreen" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#00A071"/>
        <stop offset="1" stop-color="#00F076"/>
      </linearGradient>
    </defs>
    <!-- Left-top (blue): from (0,0) to tip (22, 13) -->
    <path d="M0 0 L11.5 11.5 L22 13 Z" fill="url(#gpBlue)"/>
    <!-- Left-bottom (green): from (0,26) to tip -->
    <path d="M0 26 L11.5 14.5 L22 13 Z" fill="url(#gpGreen)"/>
    <!-- Top-right (red): from (0,0) to tip -->
    <path d="M0 0 L22 13 L0 26 Z" fill="url(#gpRed)" opacity="0"/>
    <!-- Rhombus body — combines into a play triangle -->
    <path d="M0 0 L22 13 L11.5 13 Z" fill="url(#gpBlue)"/>
    <path d="M0 26 L22 13 L11.5 13 Z" fill="url(#gpGreen)"/>
    <path d="M0 0 L11.5 13 L0 26 Z" fill="url(#gpRed)"/>
    <path d="M22 13 L11.5 13 Z" fill="url(#gpYellow)"/>
  </g>

  <g fill="#ffffff" font-family="'Roboto', 'Product Sans', -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="50" y="22" font-size="9" letter-spacing="0.06em">GET IT ON</text>
    <text x="50" y="41" font-size="19" font-weight="500" letter-spacing="-0.01em">Google Play</text>
  </g>
</svg>
